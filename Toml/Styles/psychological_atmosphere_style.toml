[PsychologicalAtmosphere]
   [PsychologicalAtmosphere.N_0]
      MainStyle = "Psychological Atmosphere"
      SubStyle = "Ambient cognitive load"
      Positive = "The environment suggests sustained mental pressure through dense visual information, constrained pathways, and layered signals that imply constant interpretation, decision making, and attentional fatigue without depicting explicit emotional performance."
   [PsychologicalAtmosphere.N_1]
      MainStyle = "Psychological Atmosphere"
      SubStyle = "Quiet surveillance"
      Positive = "Spatial arrangement implies that behavior is being monitored by systems, architecture, or social design, creating a controlled atmosphere where people would self-regulate due to perceived observation rather than visible conflict."
   [PsychologicalAtmosphere.N_2]
      MainStyle = "Psychological Atmosphere"
      SubStyle = "Behavior-shaping space"
      Positive = "Built forms, light direction, and object placement subtly guide movement and choices, making the scene feel psychologically programmed, where cognition is steered by environmental cues instead of overt instruction."

[InstitutionalPressure]
   [InstitutionalPressure.N_0]
      MainStyle = "Institutional Pressure"
