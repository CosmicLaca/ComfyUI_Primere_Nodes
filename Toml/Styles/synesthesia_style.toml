   [SensoryTranslationSynesthesia.N_1]
      MainStyle = "Sensory Translation (Synesthesia Systems)"
      SubStyle = "Perceptual fusion"
      Positive = "Multiple sensory channels are fused into one visual field, producing meaningful correspondences between intensity, tone, and material sensation without collapsing into random abstraction."
   [SensoryTranslationSynesthesia.N_2]
      MainStyle = "Sensory Translation (Synesthesia Systems)"
      SubStyle = "Encoded sensation"
      Positive = "The composition behaves like a sensory interface where each visual decision implies a specific non-visual stimulus, allowing viewers to infer felt qualities from structured visual cues."

