      SubStyle = ""
      Positive = "Spatial perception is uncertain and unstable, objects lack clear reference points for size, proportions feel ambiguous, the viewer cannot easily determine whether elements are small or massive, depth cues are intentionally weakened or conflicting, creating a surreal but believable uncertainty in spatial interpretation."

   [Scale.N_1]
